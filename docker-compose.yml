services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: news_aggregator_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      DB_HOST: mariadb
      REDIS_HOST: redis
    networks:
      - news_aggregator_network
    depends_on:
      - mariadb
      - redis

  nginx:
    image: nginx:alpine
    container_name: news_aggregator_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - news_aggregator_network
    depends_on:
      - app

  mariadb:
    image: mariadb:11
    container_name: news_aggregator_mariadb
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - news_aggregator_network

  redis:
    image: redis:alpine
    container_name: news_aggregator_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - news_aggregator_network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: news_aggregator_queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    command: php artisan horizon
    environment:
      DB_HOST: mariadb
      REDIS_HOST: redis
    networks:
      - news_aggregator_network
    depends_on:
      - mariadb
      - redis

networks:
  news_aggregator_network:
    driver: bridge

volumes:
  mariadb_data:
  redis_data:
